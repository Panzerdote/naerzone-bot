<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar servidor - Naerzone Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1b2f 0%, #2a2b4a 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
        }
        h1 span {
            color: #5865F2;
        }
        .server-header {
            background: rgba(88, 101, 242, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid rgba(88, 101, 242, 0.3);
        }
        .server-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .server-id {
            font-size: 0.9rem;
            color: #b9bbbe;
        }
        .config-section {
            background: rgba(44, 47, 51, 0.9);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #5865F2;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #b9bbbe;
            font-size: 0.9rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #40444b;
            border-radius: 8px;
            background: #2c2f33;
            color: white;
            font-size: 1rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #5865F2;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .time-group {
            display: flex;
            gap: 10px;
        }
        .time-group input {
            width: 100px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-primary:hover {
            background: #4752c4;
        }
        .btn-secondary {
            display: inline-block;
            padding: 12px 24px;
            background: transparent;
            border: 1px solid #5865F2;
            color: #5865F2;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s;
        }
        .btn-secondary:hover {
            background: rgba(88, 101, 242, 0.1);
        }
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success {
            background: rgba(59, 165, 92, 0.2);
            border: 1px solid #3ba55c;
            color: #3ba55c;
        }
        .message.error {
            background: rgba(237, 66, 69, 0.2);
            border: 1px solid #ed4245;
            color: #ed4245;
        }
        .loader {
            display: none;
            border: 3px solid #2c2f33;
            border-top: 3px solid #5865F2;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .info-box {
            background: rgba(88, 101, 242, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #b9bbbe;
        }
        .channel-selector {
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 <span>Naerzone</span> Bot</h1>
        
        <div class="server-header">
            <div class="server-name">{{ guild_name }}</div>
            <div class="server-id">ID: {{ guild_id }}</div>
        </div>

        <div id="message" class="message"></div>

        <!-- SECCIÓN 1: CREDENCIALES DE NAERZONE -->
        <div class="config-section">
            <h2 class="section-title">🔑 Credenciales de Naerzone</h2>
            
            <div class="form-group">
                <label>Usuario de Naerzone</label>
                <input type="text" id="usuario" value="{{ credenciales.usuario if credenciales else '' }}" 
                       placeholder="Ej: mi_usuario">
            </div>

            <div class="form-group">
                <label>Contraseña de Naerzone</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn-primary" id="btnGuardarCredenciales">Guardar credenciales</button>
        </div>

        <!-- SECCIÓN 2: CONFIGURACIÓN DEL BOT -->
        <div class="config-section">
            <h2 class="section-title">⚙️ Configuración del bot</h2>
            
            <div class="form-group">
                <label>Canal de envío</label>
                <select id="canal" class="channel-selector">
                    <option value="">-- Selecciona un canal --</option>
                    <!-- Los canales se cargarán vía API -->
                </select>
                <small style="color: #b9bbbe;">Selecciona el canal donde se publicarán las ofertas</small>
            </div>

            <div class="form-group">
                <label>Hora de envío</label>
                <div class="time-group">
                    <input type="number" id="hora" min="0" max="23" value="{{ config.hora_envio if config else 22 }}" placeholder="HH">
                    <span style="color: #b9bbbe; align-self: center;">:</span>
                    <input type="number" id="minuto" min="0" max="59" value="{{ config.minuto_envio if config else 0 }}" placeholder="MM">
                </div>
                <small style="color: #b9bbbe;">Hora en formato 24h (ej: 22:30 para las 10:30 PM)</small>
            </div>

            <div class="form-group">
                <label>Mensaje personalizado</label>
                <textarea id="mensaje" placeholder="@everyone atentos que tenemos promo, joder.">{{ config.mensaje_personalizado if config else '' }}</textarea>
                <small style="color: #b9bbbe;">Este mensaje se enviará ANTES de la oferta (puedes usar @everyone)</small>
            </div>

            <button class="btn-primary" id="btnGuardarConfig">Guardar configuración</button>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/dashboard" class="btn-secondary">← Volver al dashboard</a>
        </div>

        <div class="loader" id="loader"></div>
    </div>

    <script>
        const guildId = "{{ guild_id }}";
        const guildName = "{{ guild_name }}";
        
        const messageDiv = document.getElementById('message');
        const loader = document.getElementById('loader');

        function mostrarMensaje(texto, tipo) {
            messageDiv.textContent = texto;
            messageDiv.className = `message ${tipo}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // ========== CREDENCIALES ==========
        document.getElementById('btnGuardarCredenciales').addEventListener('click', async () => {
            const usuario = document.getElementById('usuario').value;
            const password = document.getElementById('password').value;

            if (!usuario || !password) {
                mostrarMensaje('❌ Completa todos los campos', 'error');
                return;
            }

            loader.style.display = 'block';

            try {
                // Verificar credenciales
                const verifyRes = await fetch('/api/verificar-credenciales', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });
                const verifyData = await verifyRes.json();

                if (!verifyData.valido) {
                    throw new Error('Credenciales inválidas');
                }

                // Guardar
                const saveRes = await fetch('/api/guardar-credenciales', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        guild_id: guildId,
                        guild_name: guildName,
                        usuario,
                        password
                    })
                });
                const saveData = await saveRes.json();

                if (!saveData.exito) {
                    throw new Error(saveData.error || 'Error al guardar');
                }

                mostrarMensaje('✅ Credenciales guardadas correctamente', 'success');
                
            } catch (error) {
                mostrarMensaje(`❌ ${error.message}`, 'error');
            } finally {
                loader.style.display = 'none';
            }
        });

        // ========== CONFIGURACIÓN ==========
        async function cargarCanales() {
            // Esto requeriría una API que devuelva los canales del servidor
            // Por ahora, dejamos que el usuario ingrese el ID manualmente
            console.log('Cargar canales no implementado');
        }

        document.getElementById('btnGuardarConfig').addEventListener('click', async () => {
            const canalId = document.getElementById('canal').value;
            const hora = parseInt(document.getElementById('hora').value);
            const minuto = parseInt(document.getElementById('minuto').value);
            const mensaje = document.getElementById('mensaje').value;

            if (!canalId) {
                mostrarMensaje('❌ Selecciona un canal', 'error');
                return;
            }

            if (isNaN(hora) || hora < 0 || hora > 23 || isNaN(minuto) || minuto < 0 || minuto > 59) {
                mostrarMensaje('❌ Hora inválida', 'error');
                return;
            }

            loader.style.display = 'block';

            try {
                const saveRes = await fetch('/api/guardar-config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        guild_id: guildId,
                        canal_id: canalId,
                        canal_nombre: 'Canal seleccionado',
                        hora,
                        minuto,
                        mensaje_personalizado: mensaje
                    })
                });
                const saveData = await saveRes.json();

                if (!saveData.exito) {
                    throw new Error('Error al guardar configuración');
                }

                mostrarMensaje('✅ Configuración guardada correctamente', 'success');
                
            } catch (error) {
                mostrarMensaje(`❌ ${error.message}`, 'error');
            } finally {
                loader.style.display = 'none';
            }
        });

        // Cargar configuración actual
        cargarCanales();
    </script>
</body>
</html>
